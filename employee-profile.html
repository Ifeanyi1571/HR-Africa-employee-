<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Profile</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
        rel="stylesheet"
  >

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
                inter: ['Inter', 'sans-serif'],
                jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
        },
      },
    };
  </script>
</head>

<body class="bg-[#F7F8FC] font-inter">

  <section class="min-h-screen flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-6xl bg-white rounded-lg shadow-sm overflow-hidden">

      <div class="grid lg:grid-cols-[2fr_1fr]">

        <!-- LEFT SIDE -->
        <div class="p-8 lg:p-10">

          <!-- Logo -->
          <img
            src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780245572/Text_e0vh6o.png"
            alt="HRFlow Africa"
            class="w-40 mb-10 mx-auto lg:mx-0"
          >

          <!-- Heading -->
          <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center lg:text-left">
            Complete Your Profile
          </h1>

          <!-- Form -->
          <div class="grid md:grid-cols-2 gap-5">

            <!-- Full Name -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Full Name
              </label>

              <input
                type="text"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Contact Address -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Contact Address
              </label>

              <input
                type="text"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Phone Number -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Phone Number
              </label>

              <input
                type="tel"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Department -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Department
              </label>

              <select
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option>Select Department</option>
                <option>HR</option>
                <option>Finance</option>
                <option>Marketing</option>
                <option>Engineering</option>
              </select>
            </div>

            <!-- Date of Birth -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Date of Birth
              </label>

              <input
                type="date"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Job Title -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">
                Job Title
              </label>

              <select
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option>Select Job Title</option>
                <option>Manager</option>
                <option>Supervisor</option>
                <option>Executive</option>
                <option>Officer</option>
              </select>
            </div>

          </div>

          <!-- Buttons -->
          <div class="mt-12 flex flex-col sm:flex-row gap-4">

            <button
              id="backBtn"
              class="border border-gray-300 px-10 py-3 rounded-lg font-semibold text-gray-700"
            >
              Back
            </button>

            <button
              id="saveBtn"
              class="bg-[#3856D6] text-white px-10 py-3 rounded-lg font-semibold flex-1 hover:bg-blue-600"
            >
              Save & Continue
            </button>

          </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="bg-[#eeeeee] border-t lg:border-t-0 lg:border-l border-gray-200">

          <div class="p-8 flex flex-col items-center justify-center h-full">

            <h2 class="text-xl font-semibold text-gray-800 mb-8">
              Upload Profile Photo
            </h2>

            <!-- Profile Placeholder -->
            <div
              class="w-44 h-44 flex items-center justify-center"
            >
            <img src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780658925/gg_profile_qzz3g0.png" alt="">
             
            </div>

            <p class="text-gray-500 text-sm font-bold mt-6">
              JPG, PNG (Max 2MB)
            </p>

            <button
              class="mt-6 border border-gray-300 px-10 py-3 rounded-lg font-bold hover:bg-[#3856D6] hover:text-white"
            >
              Upload
            </button>

          </div>

        </div>

      </div>

    </div>

  </section>

  <script>
    const saveBtn = document.getElementById("saveBtn");
    const backBtn = document.getElementById("backBtn");

    saveBtn?.addEventListener("click", () => {
      window.location.href = "employee-splash.html";
    });

    backBtn?.addEventListener("click", () => {
      window.history.back();
    });
  </script>

</body>
</html>
