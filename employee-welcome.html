<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <script src=""></script>
    

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class=" w-full max-w-6xl bg-white shadow-lg rounded-lg overflow-hidden">

        <div class="grid md:grid-cols-2">

            <!-- LEFT -->
            <div class="p-10 lg:p-14">

                <!-- Logo -->
        
                    <div class="flex flex-col mb-8">
                        <img
                        src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780223620/Logo_rdcq3x.png"
                        alt="HFA Logo"
                        class="w-40"
                        >
                        <h2 class="font-inter text-xl font-semibold text-[#3856D6] ml-2"
                        >
                        HRFlow Africa
                        </h2>
                        
                    </div>
                
                    <div>
                    <h2 class="font-inter text-3xl font-bold text-gray-800 mb-2">
                    Welcome back!
                    </h2>

                    <p class="font-jakarta text-gray-500 mb-8">
                    Please login to your account
                    </p>
                    </div>

                <!-- FORM -->
                <form class="space-y-5" id="loginForm">

                    <div>
                        <label class="font-jakarta mb-2 font-bold text-gray-700 text-sm">
                            Email or Employee ID
                        </label>

                        <input
                            id="email"
                            type="email"
                            placeholder="Enter your email or employee ID"
                            required
                            class="w-full border rounded-md px-4 py-3 outline-none focus:border-blue-600"
                        >
                    </div>

                    <div>
                        <label class="font-jakarta mb-2 font-bold text-gray-700 text-sm">
                            Password
                        </label>

                        <div class="relative">

                            <input
                                id="password"
                                type="password"
                                placeholder="Enter your password"
                                required
                                class="w-full border rounded-md px-4 py-3 pr-12 outline-none focus:border-blue-60"
                            >

                            <button
                                type="button"
                                id="togglePassword"
                                class="absolute right-4 top-1/2 -translate-y-1/2"
                            >
                            <img src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780273280/mdi_eye-off-outline_mtjwzt.png" alt="eye">

                            </button>

                        </div>

                        <div class="flex justify-end mt-2">

                            <a
                                href="#"
                                class="font-jakarta text-[#3856D6] text-sm font-bold"
                            >
                                Forgot Password?
                            </a>

                        </div>
                    </div>

                    <button
                        id="signupBtn"
                        type="submit"
                        class="font-inter w-full bg-[#3856D6] hover:bg-blue-700 text-white py-3 rounded-md font-semibold transition"
                    >
                    <!-- <a href="dashboard.html">Log In</a> -->
                        Log In
                    </button>

                </form>

                <!-- Divider -->
                <div class="flex items-center my-8">

                    <div class="flex-1 h-px bg-gray-300"></div>

                    <span class="font-jakarta px-4 text-gray-400 text-sm">
                        OR CONTINUE WITH
                    </span>

                    <div class="flex-1 h-px bg-gray-300"></div>

                </div>

                <!-- Social -->
                <div class="flex justify-center gap-6 text-2xl">

                    <button><img src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780223289/material-icon-theme_google_uha3an.png" alt="google logo"></button>
                    <button><img src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780222731/Vector_jmuon8.png" alt="apple logo"></button>

                </div>

                <p class="font-jakarta text-center mt-8 text-gray-500">

                    Don't have an account?

                    <a
                        href="#"
                        class="font-jakarta text-[#3856D6] font-semibold"
                    >
                        Contact HR
                    </a>

                </p>

            </div>

            <!-- RIGHT -->
            <div
                class="bg-gray-50 flex items-center justify-center"
            >

                <img
                    src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780222733/Image_nddi98.png"
                    alt="Login Illustration"
                    class="w-full h-full object-contain p-8"
                >

            </div>

        </div>

    </div>


</body>
<script>
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", () => {

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }

});

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const response = await fetch(
      "https://hrflow-backend-nf0t.onrender.com/api/auth/login",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          email,
          password,
        }),
      }
    );

    const data = await response.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("userId", data.userId);

      window.location.href = "employee-dashboard.html";
    } else {
      alert("Invalid email or password");
    }
  } catch (error) {
    console.error(error);
    alert("Something went wrong");
  }
});
    
</script>


</html>
