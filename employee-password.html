<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password</title>

    <script src="password.js" defer></script>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
        rel="stylesheet"
    >
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-6xl bg-white rounded-lg shadow-lg overflow-hidden">

        <div class="grid md:grid-cols-2">

            <!-- LEFT -->
            <div class="p-8 lg:p-14">

                <!-- Logo -->
                <div class="mb-14">
                    <img
                        src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780245572/Text_e0vh6o.png"
                        alt="HRFlow Africa"
                        class="w-32 md:w-36"
                    >
                </div>

                <h2 class="font-inter text-2xl font-bold text-gray-800 mb-10">
                    Create Your Password
                </h2>

                <!-- New Password -->
                <div class="mb-5">

                    <label
                        class="block font-jakarta text-base font-semibold text-gray-700 mb-2"
                    >
                        New Password
                    </label>

                    <div class="relative">

                        <input
                            id="password"
                            type="password"
                            placeholder=""
                            class="w-full h-12 border border-gray-300 rounded-md px-4 pr-12 font-jakarta outline-none focus:border-[#3856D6]"
                        >

                        <button
                            type="button"
                            id="togglePassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2"
                        >
                             <img src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780273280/mdi_eye-off-outline_mtjwzt.png" alt="eye">
                        </button>

                    </div>

                </div>

                <!-- Confirm Password -->
                <div class="mb-8">

                    <label
                        class="block font-jakarta text-base font-semibold text-gray-700 mb-2"
                    >
                        Confirm Password
                    </label>

                    <div class="relative">

                        <input
                            id="confirmPassword"
                            type="password"
                            placeholder=""
                            class="w-full h-12 border border-gray-300 rounded-md px-4 pr-12 font-jakarta outline-none focus:border-[#3856D6]"
                        >

                        <button
                            type="button"
                            id="toggleConfirmPassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2"
                        >
                            <img src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780273280/mdi_eye-off-outline_mtjwzt.png" alt="eye">
                        </button>

                    </div>

                </div>

                <!-- Security Tips -->
                <div class="mb-10">

    <h3
        class="font-inter text-sm font-semibold text-gray-800 mb-3"
    >
        Security Tips
    </h3>

    <div class="space-y-3">

        <!-- 8 Characters -->
        <div class="flex items-center gap-2">

            <div
                id="lengthIcon"
                class="w-4 h-4 rounded-full border border-gray-400"
            ></div>

            <span
                id="lengthText"
                class="font-jakarta text-sm text-gray-400"
            >
                At least 8 characters
            </span>

        </div>

        <!-- Uppercase -->
        <div class="flex items-center gap-2">

            <div
                id="uppercaseIcon"
                class="w-4 h-4 rounded-full border border-gray-400"
            ></div>

            <span
                id="uppercaseText"
                class="font-jakarta text-sm text-gray-400"
            >
                Uppercase letters
            </span>

        </div>

        <!-- Lowercase -->
        <div class="flex items-center gap-2">

            <div
                id="lowercaseIcon"
                class="w-4 h-4 rounded-full border border-gray-400"
            ></div>

            <span
                id="lowercaseText"
                class="font-jakarta text-sm text-gray-400"
            >
                Lowercase letters
            </span>

        </div>

        <!-- Number -->
        <div class="flex items-center gap-2">

            <div
                id="numberIcon"
                class="w-4 h-4 rounded-full border border-gray-400"
            ></div>

            <span
                id="numberText"
                class="font-jakarta text-sm text-gray-400"
            >
                At least one number
            </span>

        </div>

    </div>

</div>
                <button
                    class="w-full h-12 bg-[#3856D6] hover:bg-blue-700 text-white rounded-md font-inter font-semibold transition"
                >
                <a href="employee-welcome.html">Continue</a>
                    
                </button>

            </div>

            <!-- RIGHT -->
            <div
                class="bg-gray-50 flex items-center justify-center"
            >

                <img
                    src="https://res.cloudinary.com/dnmaevqsp/image/upload/v1780592985/Image_6_rkj1ev.png"
                    alt="Password Security"
                    class="w-full h-full"
                >

            </div>

        </div>

    </div>



    <script>
        const password = document.getElementById("password");

// Length
const lengthIcon = document.getElementById("lengthIcon");
const lengthText = document.getElementById("lengthText");

// Uppercase
const uppercaseIcon = document.getElementById("uppercaseIcon");
const uppercaseText = document.getElementById("uppercaseText");

// Lowercase
const lowercaseIcon = document.getElementById("lowercaseIcon");
const lowercaseText = document.getElementById("lowercaseText");

// Number
const numberIcon = document.getElementById("numberIcon");
const numberText = document.getElementById("numberText");

password.addEventListener("input", () => {

    const value = password.value;

    updateRule(
        value.length >= 8,
        lengthIcon,
        lengthText
    );

    updateRule(
        /[A-Z]/.test(value),
        uppercaseIcon,
        uppercaseText
    );

    updateRule(
        /[a-z]/.test(value),
        lowercaseIcon,
        lowercaseText
    );

    updateRule(
        /[0-9]/.test(value),
        numberIcon,
        numberText
    );

});

function updateRule(isValid, icon, text) {

    if (isValid) {

        icon.classList.remove(
            "border-gray-400"
        );

        icon.classList.add(
            "bg-green-500"
        );

        text.classList.remove(
            "text-gray-400"
        );

        text.classList.add(
            "text-gray-700"
        );

    } else {

        icon.classList.remove(
            "bg-green-500"
        );

        icon.classList.add(
            "border-gray-400"
        );

        text.classList.remove(
            "text-gray-700"
        );

        text.classList.add(
            "text-gray-400"
        );

    }

}

// For confirm password

confirmPassword.addEventListener("input", () => {

    
    if (confirmPassword.value === "") {

        confirmPassword.classList.remove(
            "border-green-500",
            "border-red-500"
        );

        return;
    }

    if (password.value === confirmPassword.value) {

        confirmPassword.classList.remove("border-red-500");
        confirmPassword.classList.add("border-green-500");

    } else {

        confirmPassword.classList.remove("border-green-500");
        confirmPassword.classList.add("border-red-500");

    }

});

//For toggle 
const togglePassword = document.getElementById("togglePassword");
const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");

togglePassword.addEventListener("click", () => {

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }

});

toggleConfirmPassword.addEventListener("click", () => {

    if (confirmPassword.type === "password") {
        confirmPassword.type = "text";
    } else {
        confirmPassword.type = "password";
    }

});

    </script>

</body>
</html>
